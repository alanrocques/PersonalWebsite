<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alan Rocque</title>
  <meta
    name="description"
    content="Alan Rocque — CS + Data Science at UW–Madison. Building tooling and evaluation for the next layer of AI systems."
  >
  <meta property="og:title" content="Alan Rocque">
  <meta
    property="og:description"
    content="CS + Data Science at UW–Madison. Building tooling and evaluation for the next layer of AI systems."
  >
  <meta property="og:type" content="website">
  <style>
    :root {
      --board-w: min(96vw, 1360px);
      --board-pad: clamp(10px, 1.8vw, 24px);
      --tw: min(26px, calc((var(--board-w) - var(--board-pad) * 2 - 8px) / 54 - 4px));
      --th: calc(var(--tw) * 1.55);

      --board-bg: #14100c;
      --page-bg: var(--board-bg);
      --tile-top: #221a13;
      --tile-mid: #18130d;
      --tile-bot: #070503;
      --tile-fg: #f5ecd6;
      --tile-fg-dim: #b3a988;
      --accent-teal: #1f8aac;
      --accent-orange: #f58a0f;
      --accent-red: #d5340b;
      --accent-amber: #e9b145;
      --rule: rgba(242, 231, 207, 0.10);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: var(--tile-fg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    body {
      background-color: var(--page-bg);
      background-image:
        repeating-linear-gradient(135deg,
          rgba(245, 138, 15, 0.05) 0px,
          rgba(245, 138, 15, 0.05) 18px,
          transparent 18px,
          transparent 36px),
        repeating-linear-gradient(45deg,
          rgba(213, 52, 11, 0.04) 0px,
          rgba(213, 52, 11, 0.04) 18px,
          transparent 18px,
          transparent 36px);
      background-attachment: fixed;
    }

    .stage {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(28px, 6vw, 80px) 0 clamp(20px, 4vw, 48px);
    }

    .board {
      width: var(--board-w);
      padding: clamp(16px, 2.4vw, 32px) var(--board-pad);
      background: var(--board-bg);
    }

    .board__inner {
      display: flex;
      flex-direction: column;
      gap: calc(var(--th) * 0.18);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0;
      text-decoration: none;
      color: inherit;
      padding: 2px 0;
      transition: opacity 160ms ease;
    }

    .row--link { cursor: pointer; }

    .row--link:hover,
    .row--link:focus-visible {
      outline: none;
    }

    .row--link:hover .tile,
    .row--link:focus-visible .tile {
      filter: brightness(1.18) saturate(1.05);
    }

    .row--link:focus-visible {
      box-shadow: inset 0 0 0 1px var(--accent-orange);
    }

    .row--header { margin-bottom: calc(var(--th) * 0.35); }

    .row--columns {
      margin-bottom: calc(var(--th) * 0.18);
    }

    .row--tagline {
      justify-content: center;
      margin: calc(var(--th) * 0.45) 0;
    }

    .row--rule {
      height: 1px;
      background: var(--rule);
      margin: calc(var(--th) * 0.3) 0;
    }

    .cells {
      display: inline-flex;
      flex-wrap: nowrap;
    }

    .gap {
      display: inline-block;
      flex: 0 0 auto;
    }

    .spring {
      flex: 1 1 auto;
      min-width: 0;
    }

    .tile {
      position: relative;
      display: inline-block;
      width: var(--tw);
      height: var(--th);
      margin: 2px;
      background: var(--tile-mid);
      border-radius: 2px;
      perspective: 260px;
      flex: 0 0 auto;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.05) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset,
        0 2px 3px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(0, 0, 0, 0.4);
    }

    .tile::after {
      content: "";
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 1px;
      transform: translateY(-0.5px);
      background: rgba(0, 0, 0, 0.35);
      z-index: 6;
      pointer-events: none;
    }

    .tile__half,
    .tile__flap {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background-image: linear-gradient(180deg, var(--tile-top) 0%, var(--tile-mid) 50%, var(--tile-bot) 100%);
      background-size: 100% var(--th);
      background-repeat: no-repeat;
    }

    .tile__half--top,
    .tile__flap--top {
      top: 0;
      background-position: top;
    }

    .tile__half--bottom,
    .tile__flap--bottom {
      bottom: 0;
      background-position: bottom;
    }

    .tile__flap--top {
      transform-origin: bottom center;
      transform: rotateX(0deg);
      z-index: 3;
      backface-visibility: hidden;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
    }

    .tile__flap--top::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 60%);
      pointer-events: none;
    }

    .tile__flap--bottom {
      transform-origin: top center;
      transform: rotateX(90deg);
      z-index: 3;
      backface-visibility: hidden;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
    }

    .tile__flap--bottom::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
    }

    .tile__glyph {
      position: absolute;
      left: 0;
      right: 0;
      width: 100%;
      height: var(--th);
      line-height: var(--th);
      text-align: center;
      font-family: "Helvetica Neue", "Arial Black", Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: calc(var(--th) * 0.86);
      letter-spacing: -0.02em;
      color: var(--tile-fg);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.55);
      user-select: none;
      transition: color 160ms ease;
      z-index: 2;
    }

    .tile__half--top .tile__glyph,
    .tile__flap--top .tile__glyph { top: 0; }

    .tile__half--bottom .tile__glyph,
    .tile__flap--bottom .tile__glyph { bottom: 0; }

    .cells--dim .tile__glyph {
      color: var(--tile-fg-dim);
      font-size: calc(var(--th) * 0.74);
      font-weight: 700;
    }

    .cells--teal .tile__glyph { color: var(--accent-teal); }
    .cells--orange .tile__glyph { color: var(--accent-orange); }
    .cells--red .tile__glyph { color: var(--accent-red); }
    .cells--amber .tile__glyph { color: var(--accent-amber); }
    .cells--muted .tile__glyph { color: var(--tile-fg-dim); }

    .cells--name {
      --tw: clamp(28px, 4vw, 44px);
      --th: calc(var(--tw) * 1.45);
    }
    .cells--name .tile__glyph {
      font-size: calc(var(--th) * 0.88);
      letter-spacing: -0.04em;
    }

    .tile.flip .tile__flap--top {
      animation: flapTop 320ms cubic-bezier(0.55, 0.05, 0.45, 0.95) forwards;
    }

    .tile.flip .tile__flap--bottom {
      animation: flapBottom 320ms cubic-bezier(0.55, 0.05, 0.45, 0.95) forwards;
    }

    @keyframes flapTop {
      0% { transform: rotateX(0deg); }
      50%, 100% { transform: rotateX(-90deg); }
    }

    @keyframes flapBottom {
      0%, 50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .legal {
      width: var(--board-w);
      max-width: 96vw;
      margin: 14px auto 32px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(242, 231, 207, 0.32);
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0);
      white-space: nowrap; border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .tile.flip .tile__flap--top,
      .tile.flip .tile__flap--bottom {
        animation: none;
      }
      .tile__flap--top { transform: rotateX(-90deg); }
      .tile__flap--bottom { transform: rotateX(0deg); }
    }

    @media (max-width: 720px) {
      :root {
        --tw: clamp(11px, 3.6vw, 18px);
      }

      .stage { padding: clamp(16px, 5vw, 32px) 0; }

      .row--columns,
      .row--tagline {
        display: none;
      }

      .row--header {
        flex-wrap: wrap;
        row-gap: 8px;
        margin-bottom: calc(var(--th) * 0.45);
      }
      .row--header .spring { display: none; }
      .row--header .cells--name {
        --tw: clamp(20px, 6.8vw, 36px);
        --th: calc(var(--tw) * 1.45);
        width: 100%;
      }

      .row--entry {
        flex-wrap: wrap;
        row-gap: 2px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(245, 236, 214, 0.06);
      }
      .row--entry .gap { display: none; }
      .row--entry .cells--flight {
        width: 100%;
        margin-bottom: 4px;
      }
      .row--entry .cells--dest .tile__glyph {
        font-size: calc(var(--th) * 0.74);
      }
      .row--entry .cells--gate { display: none; }
      .row--entry .cells--status { margin-left: auto; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="sr-only">Alan Rocque — portfolio</h1>
    <section class="board" aria-label="Alan Rocque split-flap portfolio board">
      <div class="board__inner" id="board"></div>
    </section>
  </main>
  <p class="legal">ALAN ROCQUE · MAY 2026 · UW MADISON</p>

  <script>
    (function () {
      'use strict';

      const CHARSET = (' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-./+:').split('');
      const SAFE = new Set(CHARSET);
      const RANDOM_POOL = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');

      const COLS = { flight: 12, dest: 22, gate: 6, status: 8 };
      const COL_GAP = 2;
      const TOTAL_COLS = COLS.flight + COL_GAP + COLS.dest + COL_GAP + COLS.gate + COL_GAP + COLS.status;

      const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const ROWS = [
        { kind: 'header' },
        { kind: 'rule' },
        { kind: 'columns' },
        {
          kind: 'entry', flight: 'ENGRAM', dest: 'AGENT MEMORY SVC', gate: 'REPO', status: 'OPEN',
          href: 'https://github.com/alanrocques/Engram',
          label: 'Engram, agent memory service. Open repository.'
        },
        {
          kind: 'entry', flight: 'KIMIHARNESS', dest: 'RESEARCH REPRO', gate: 'REPO', status: 'OPEN',
          href: 'https://github.com/alanrocques/KimiHarness',
          label: 'KimiHarness, research reproduction. Open repository.'
        },
        {
          kind: 'entry', flight: 'DREAMBENCH', dest: 'WORLD MODEL BENCH', gate: 'REPO', status: 'OPEN',
          href: 'https://github.com/alanrocques/DreamBench',
          label: 'DreamBench, world model benchmark. Open repository.'
        },
        {
          kind: 'entry', flight: 'CONDUIT', dest: 'BROWSER MCP BRIDGE', gate: 'REPO', status: 'OPEN',
          href: 'https://github.com/alanrocques/Conduit',
          label: 'Conduit, browser-to-MCP bridge for AI agents. Open repository.'
        },
        { kind: 'rule' },
        {
          kind: 'entry', flight: 'AMAZON', dest: 'INCOMING SWE', gate: '2026', status: 'BOARDING',
          label: 'Amazon, incoming software engineer 2026.'
        },
        {
          kind: 'entry', flight: 'AMAZON', dest: 'SWE INTERN', gate: '2025', status: 'ARRIVED',
          label: 'Amazon, software engineer intern 2025.'
        },
        {
          kind: 'entry', flight: 'INTEL', dest: 'SWE INTERN', gate: '23 24', status: 'ARRIVED',
          label: 'Intel, software engineer intern 2023 and 2024.'
        },
        { kind: 'rule' },
        { kind: 'tagline', text: 'TOOLING + EVAL FOR THE NEXT AI LAYER' },
        { kind: 'rule' },
        {
          kind: 'entry', flight: 'EMAIL', dest: 'ALANROCQUE OUTLOOK', gate: 'MAIL', status: 'OPEN',
          href: 'mailto:alanrocque@outlook.com',
          label: 'Email Alan Rocque.'
        },
        {
          kind: 'entry', flight: 'GITHUB', dest: 'ALANROCQUES', gate: 'LINK', status: 'OPEN',
          href: 'https://github.com/alanrocques',
          label: 'GitHub profile.'
        },
        {
          kind: 'entry', flight: 'LINKEDIN', dest: 'ALAN ROCQUE', gate: 'LINK', status: 'OPEN',
          href: 'https://www.linkedin.com/in/alan-rocque-0933bb27b',
          label: 'LinkedIn profile.'
        },
        {
          kind: 'entry', flight: 'RESUME', dest: 'ALAN ROCQUE 2026', gate: 'PDF', status: 'OPEN',
          href: 'Alan_Rocque_2026.pdf',
          label: 'Resume PDF.'
        }
      ];

      function sanitize(s) {
        s = (s == null ? '' : String(s)).toUpperCase();
        let out = '';
        for (const ch of s) out += SAFE.has(ch) ? ch : ' ';
        return out;
      }

      function pad(s, width) {
        s = sanitize(s);
        if (s.length >= width) return s.slice(0, width);
        return s + ' '.repeat(width - s.length);
      }

      function makeTile() {
        const tile = document.createElement('span');
        tile.className = 'tile';
        tile.dataset.char = ' ';
        tile.innerHTML =
          '<span class="tile__half tile__half--top"><span class="tile__glyph"> </span></span>' +
          '<span class="tile__half tile__half--bottom"><span class="tile__glyph"> </span></span>' +
          '<span class="tile__flap tile__flap--top"><span class="tile__glyph"> </span></span>' +
          '<span class="tile__flap tile__flap--bottom"><span class="tile__glyph"> </span></span>';
        return tile;
      }

      function disp(ch) {
        return ch === ' ' ? ' ' : ch;
      }

      function settle(tile, ch) {
        const d = disp(ch);
        const glyphs = tile.querySelectorAll('.tile__glyph');
        for (const g of glyphs) g.textContent = d;
        tile.dataset.char = ch;
        tile.classList.remove('flip');
      }

      let pendingTimers = new WeakMap();

      function flip(tile, ch) {
        const old = tile.dataset.char || ' ';
        if (old === ch) return;
        if (reduceMotion) { settle(tile, ch); return; }

        const oldD = disp(old);
        const newD = disp(ch);

        const topStatic = tile.querySelector('.tile__half--top .tile__glyph');
        const tFlapGlyph = tile.querySelector('.tile__flap--top .tile__glyph');
        const bFlapGlyph = tile.querySelector('.tile__flap--bottom .tile__glyph');

        topStatic.textContent = newD;
        tFlapGlyph.textContent = oldD;
        bFlapGlyph.textContent = newD;

        tile.classList.remove('flip');
        // force reflow so the animation restarts cleanly
        void tile.offsetWidth;
        tile.classList.add('flip');

        const prev = pendingTimers.get(tile);
        if (prev) clearTimeout(prev);
        const t = setTimeout(() => settle(tile, ch), 340);
        pendingTimers.set(tile, t);
      }

      function makeCells(text, width, opts) {
        opts = opts || {};
        const cls = ['cells'];
        if (opts.dim) cls.push('cells--dim');
        if (opts.accent) cls.push('cells--' + opts.accent);
        const group = document.createElement('span');
        group.className = cls.join(' ');
        group.setAttribute('aria-hidden', 'true');
        const padded = pad(text, width);
        const tiles = [];
        for (const c of padded) {
          const t = makeTile();
          t.dataset.target = c;
          group.appendChild(t);
          tiles.push(t);
        }
        return { group, tiles };
      }

      function statusAccent(status) {
        const s = (status || '').toUpperCase().trim();
        if (s === 'OPEN' || s === 'LIVE') return 'amber';
        if (s === 'BOARDING') return 'orange';
        if (s === 'ARRIVED') return 'muted';
        if (s === 'DELAYED' || s === 'CANCELLED') return 'red';
        return null;
      }

      function makeGap(width) {
        const g = document.createElement('span');
        g.className = 'gap';
        g.setAttribute('aria-hidden', 'true');
        g.style.width = `calc((var(--tw) + 2px) * ${width})`;
        return g;
      }

      function makeSpring() {
        const s = document.createElement('span');
        s.className = 'spring';
        s.setAttribute('aria-hidden', 'true');
        return s;
      }

      function buildEntryRow(row) {
        const isLink = !!row.href;
        const el = document.createElement(isLink ? 'a' : 'div');
        el.className = 'row row--entry' + (isLink ? ' row--link' : '');
        if (isLink) {
          el.href = row.href;
          if (row.href.startsWith('http')) {
            el.target = '_blank';
            el.rel = 'noopener noreferrer';
          }
        }
        if (row.label) el.setAttribute('aria-label', row.label);

        const tiles = [];
        const flight = makeCells(row.flight, COLS.flight);
        flight.group.classList.add('cells--flight');
        el.appendChild(flight.group);
        tiles.push(...flight.tiles);

        el.appendChild(makeGap(COL_GAP));

        const dest = makeCells(row.dest, COLS.dest);
        dest.group.classList.add('cells--dest');
        el.appendChild(dest.group);
        tiles.push(...dest.tiles);

        el.appendChild(makeGap(COL_GAP));

        const gate = makeCells(row.gate, COLS.gate);
        gate.group.classList.add('cells--gate');
        el.appendChild(gate.group);
        tiles.push(...gate.tiles);

        el.appendChild(makeGap(COL_GAP));

        const status = makeCells(row.status, COLS.status, { accent: statusAccent(row.status) });
        status.group.classList.add('cells--status');
        el.appendChild(status.group);
        tiles.push(...status.tiles);

        return { el, tiles, statusTiles: status.tiles, statusText: pad(row.status, COLS.status) };
      }

      function buildColumnsRow() {
        const el = document.createElement('div');
        el.className = 'row row--columns';
        el.setAttribute('aria-hidden', 'true');

        const flight = makeCells('FLIGHT', COLS.flight, { dim: true });
        el.appendChild(flight.group);
        el.appendChild(makeGap(COL_GAP));
        const dest = makeCells('DESTINATION', COLS.dest, { dim: true });
        el.appendChild(dest.group);
        el.appendChild(makeGap(COL_GAP));
        const gate = makeCells('GATE', COLS.gate, { dim: true });
        el.appendChild(gate.group);
        el.appendChild(makeGap(COL_GAP));
        const status = makeCells('STATUS', COLS.status, { dim: true });
        el.appendChild(status.group);

        return { el, tiles: [...flight.tiles, ...dest.tiles, ...gate.tiles, ...status.tiles] };
      }

      function buildHeaderRow() {
        const el = document.createElement('div');
        el.className = 'row row--header';
        el.setAttribute('aria-hidden', 'true');

        const left = makeCells('ALAN ROCQUE', 11, { accent: 'orange' });
        left.group.classList.add('cells--name');
        el.appendChild(left.group);
        el.appendChild(makeSpring());
        const right = makeCells('MAY 2026   00:00', 16, { accent: 'amber' });
        el.appendChild(right.group);

        // Last 5 chars of right = clock "HH:MM"
        const clockTiles = right.tiles.slice(-5);

        return { el, tiles: [...left.tiles, ...right.tiles], clockTiles };
      }

      function buildRuleRow() {
        const el = document.createElement('div');
        el.className = 'row row--rule';
        el.setAttribute('aria-hidden', 'true');
        return { el, tiles: [] };
      }

      function buildTaglineRow(text) {
        const el = document.createElement('div');
        el.className = 'row row--tagline';
        el.setAttribute('aria-hidden', 'true');
        const cells = makeCells(text, text.length, { accent: 'orange' });
        el.appendChild(cells.group);
        return { el, tiles: cells.tiles };
      }

      function build() {
        const board = document.getElementById('board');
        const built = [];
        let header = null;

        for (const row of ROWS) {
          let b;
          if (row.kind === 'header') {
            b = buildHeaderRow();
            header = b;
          } else if (row.kind === 'rule') {
            b = buildRuleRow();
          } else if (row.kind === 'columns') {
            b = buildColumnsRow();
          } else if (row.kind === 'tagline') {
            b = buildTaglineRow(row.text);
          } else if (row.kind === 'entry') {
            b = buildEntryRow(row);
          } else {
            continue;
          }
          board.appendChild(b.el);
          built.push({ row, ...b });
        }

        return { built, header };
      }

      function cascade(built) {
        // Index tiles with row + column for stagger
        const all = [];
        built.forEach((b, rIdx) => {
          (b.tiles || []).forEach((t, cIdx) => {
            all.push({ tile: t, row: rIdx, col: cIdx, target: t.dataset.target });
          });
        });

        if (reduceMotion) {
          all.forEach(({ tile, target }) => settle(tile, target));
          return Promise.resolve();
        }

        const baseDelayPerCol = 14;
        const baseDelayPerRow = 48;
        const stepMs = 200;
        let maxFinish = 0;

        all.forEach(({ tile, row, col, target }) => {
          const startJitter = Math.random() * 50;
          const start = col * baseDelayPerCol + row * baseDelayPerRow + startJitter;
          const cycles = target === ' ' ? 0 : 1 + Math.floor(Math.random() * 3); // 1-3 random flips
          const seq = [];
          for (let i = 0; i < cycles; i++) {
            seq.push(RANDOM_POOL[Math.floor(Math.random() * RANDOM_POOL.length)]);
          }
          seq.push(target);
          seq.forEach((ch, idx) => {
            setTimeout(() => flip(tile, ch), start + idx * stepMs);
          });
          maxFinish = Math.max(maxFinish, start + (seq.length - 1) * stepMs + 340);
        });

        return new Promise(res => setTimeout(res, maxFinish + 100));
      }

      function startClock(header) {
        if (!header || !header.clockTiles) return;
        function tick() {
          const now = new Date();
          const hh = String(now.getHours()).padStart(2, '0');
          const mm = String(now.getMinutes()).padStart(2, '0');
          const txt = `${hh}:${mm}`;
          header.clockTiles.forEach((tile, i) => {
            const want = txt[i] || ' ';
            if ((tile.dataset.char || ' ') !== want) flip(tile, want);
          });
        }
        tick();
        setInterval(tick, 30 * 1000);
      }

      function statusPulse(built) {
        if (reduceMotion) return;
        const entries = built.filter(b => b.row && b.row.kind === 'entry' && b.statusTiles);
        if (!entries.length) return;

        function pulse() {
          const e = entries[Math.floor(Math.random() * entries.length)];
          const tiles = e.statusTiles;
          const finalText = e.statusText;
          const cycles = 3;
          for (let i = 0; i < cycles; i++) {
            setTimeout(() => {
              tiles.forEach((tile, idx) => {
                const target = finalText[idx];
                if (target === ' ') return;
                const r = RANDOM_POOL[Math.floor(Math.random() * RANDOM_POOL.length)];
                flip(tile, r);
              });
            }, i * 220);
          }
          setTimeout(() => {
            tiles.forEach((tile, idx) => flip(tile, finalText[idx] || ' '));
          }, cycles * 220);

          const next = 7000 + Math.random() * 6000;
          setTimeout(pulse, next);
        }

        setTimeout(pulse, 4000);
      }

      function init() {
        const { built, header } = build();
        cascade(built).then(() => {
          startClock(header);
          statusPulse(built);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
